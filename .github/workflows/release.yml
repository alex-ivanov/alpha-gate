name: Release

# Publishes alpha-gate to npm when a version tag (v*) is pushed. The full gate runs first, and the
# tag must match package.json's version. Auth: npm TRUSTED PUBLISHING (OIDC) — the package on
# npmjs.com is configured to trust this repo + this workflow file, so no token or secret exists.
# Provenance (linking the tarball to this run) is generated automatically; it requires the repo
# to be public.

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  id-token: write # npm trusted publishing: OIDC auth + provenance

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm install -g npm@latest # OIDC trusted publishing needs a newer npm than node 22 bundles
      - run: npm ci
      - run: npx biome check .
      - run: npm run typecheck
      - run: npm test
      # The tarball guard, re-run at the moment of publish. CI runs it on main and PRs, but a tag can
      # be pushed from any commit — and this is the one check that sees the package the way users get
      # it. 0.1.0 shipped a Worker that deployed clean and then threw on its first request; nothing
      # else in this job can catch that.
      - run: ./test/packaged-install.sh
      - name: Tag matches package.json version
        run: |
          PKG="$(node -p "require('./package.json').version")"
          TAG="${GITHUB_REF_NAME#v}"
          if [ "$PKG" != "$TAG" ]; then
            echo "::error::tag v${TAG} does not match package.json version ${PKG}" >&2
            exit 1
          fi
      - run: npm publish # auth + provenance via OIDC trusted publishing; no token involved
