name: Publish

# Sample publish workflow (§13/§20). Builds + signs + notarizes on a macOS runner, then publishes to
# the gated admin Worker with ONE command (publish.sh) authenticating via a Cloudflare Access SERVICE
# TOKEN (no interactive login). The build/sign steps are app-specific — fill them in for your project.
#
# This is a TEMPLATE: the build step below is a placeholder that fails on purpose, so a fork doesn't
# silently publish nothing. Replace it, then remove this note. Secrets to set:
#   APPLE_DEVELOPER_ID_CERT, APPLE_DEVELOPER_ID_CERT_PASSWORD, NOTARY_API_KEY,
#   SPARKLE_ED_PRIVATE_KEY, CF_ACCESS_CLIENT_ID, CF_ACCESS_CLIENT_SECRET, ADMIN_URL

on:
  workflow_dispatch:
  # Enable after filling in the build step (kept off so the placeholder can't run on your tags):
  # push:
  #   tags: ["v*"]

jobs:
  publish:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - run: npm ci

      # ─── APP-SPECIFIC: build → sign → notarize → staple → produce the signed artifact ───────────
      # Produce dist/MyApp.dmg (or .zip). publish.sh reads the version from the app and signs with
      # sign_update itself — but on a runner without Sparkle's tool on PATH, produce the signature
      # here and export ED_SIGNATURE (and pass --build-number/--short-version for a bare zip).
      - name: Build, sign, notarize (REPLACE ME)
        run: |
          echo "::error::Replace this step with your real build — see docs/UPLOADING.md" >&2
          exit 1

      - name: Publish
        env:
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: |
          ./publish.sh dist/MyApp.dmg \
            --admin-url "${{ secrets.ADMIN_URL }}" \
            --channel beta
